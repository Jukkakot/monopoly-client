<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#1B3D7B"/>
  <!-- Steps -->
  <rect x="1" y="28" width="30" height="3" rx="1" fill="#FFFFFF"/>
  <rect x="3" y="26" width="26" height="2" rx="1" fill="#FFFFFF"/>
  <!-- Portico with columns as negative space -->
  <rect x="5" y="18" width="22" height="8" fill="#FFFFFF"/>
  <rect x="7.5" y="18" width="1.5" height="7" fill="#1B3D7B"/>
  <rect x="11"  y="18" width="1.5" height="7" fill="#1B3D7B"/>
  <rect x="15"  y="18" width="2"   height="7" fill="#1B3D7B"/>
  <rect x="19.5" y="18" width="1.5" height="7" fill="#1B3D7B"/>
  <rect x="23"  y="18" width="1.5" height="7" fill="#1B3D7B"/>
  <!-- Pediment -->
  <polygon points="5,18 16,13 27,18" fill="#FFFFFF"/>
  <!-- Dome drum -->
  <rect x="12" y="10" width="8" height="3" fill="#FFFFFF"/>
  <!-- Dome (semicircle) -->
  <path d="M10 10 A6 6 0 0 1 22 10 Z" fill="#FFFFFF"/>
  <!-- Cross -->
  <rect x="15.5" y="2" width="1" height="5" rx="0.5" fill="#FFFFFF"/>
  <rect x="13"   y="4" width="6" height="1" rx="0.5" fill="#FFFFFF"/>
</svg>
