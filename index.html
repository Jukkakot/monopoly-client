<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/monopoly-client/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <link rel="manifest" href="/monopoly-client/manifest.webmanifest" />
    <meta name="theme-color" content="#2e7d32" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="Monopoly HKI" />
    <link rel="apple-touch-icon" href="/monopoly-client/pwa-icon-192.png" />
    <!-- Set the colour theme before first paint to avoid a light flash. Mirrors utils/theme.ts. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('monopoly_theme') || 'system';
          var dark = p === 'dark' || (p === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/monopoly-client/assets/index-CZW7q4qD.js"></script>
    <link rel="stylesheet" crossorigin href="/monopoly-client/assets/index-BFuEFQqm.css">
  </head>

  </body>
</html>
