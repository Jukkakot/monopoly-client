<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed green background (maskable safe: content within inner 80%) -->
  <rect width="512" height="512" fill="#2e7d32"/>
  <rect width="512" height="512" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a9a40"/>
      <stop offset="1" stop-color="#256628"/>
    </linearGradient>
  </defs>
  <!-- White rounded card (the "MH" plaque from the header) -->
  <rect x="118" y="150" width="276" height="212" rx="30" fill="#ffffff"/>
  <!-- Red monogram -->
  <text x="256" y="322" font-family="Arial Black, Impact, sans-serif" font-size="170"
        font-weight="900" fill="#d81f27" text-anchor="middle" letter-spacing="-6">MH</text>
</svg>
