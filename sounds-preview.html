<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Sounds Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .volume-control label {
            font-weight: 600;
            min-width: 80px;
        }
        
        .volume-control input {
            flex: 1;
            max-width: 200px;
            height: 6px;
            cursor: pointer;
        }
        
        .volume-value {
            min-width: 40px;
            text-align: right;
            font-weight: 600;
        }
        
        .sounds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .sound-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .sound-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .sound-button:active {
            transform: translateY(0);
        }
        
        .sound-name {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .sound-description {
            font-size: 0.75em;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Monopoly Sounds Preview</h1>
        
        <div class="controls">
            <div class="volume-control">
                <label for="volume">Volume:</label>
                <input type="range" id="volume" min="0" max="100" value="50">
                <span class="volume-value" id="volumeValue">50%</span>
            </div>
        </div>
        
        <div class="sounds-grid">
            <button class="sound-button" onclick="playDiceRoll()">
                <span class="sound-name">🎲 Dice Roll</span>
                <span class="sound-description">Rattling dice</span>
            </button>
            
            <button class="sound-button" style="grid-column: 1/-1; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" onclick="playTokenMoveVariants()">
                <span class="sound-name">🎮 TOKEN MOVE VARIATIONS - CARDBOARD</span>
                <span class="sound-description">Choose your favorite cardboard token sound</span>
            </button>
            
            <button class="sound-button" onclick="playTokenMove()">
                <span class="sound-name">🎮 Token Move (Default)</span>
                <span class="sound-description">Light triangle tap</span>
            </button>
            
            <button class="sound-button" onclick="playTokenMoveCardboard()">
                <span class="sound-name">📦 Cardboard (Smooth)</span>
                <span class="sound-description">Smooth sliding</span>
            </button>
            
            <button class="sound-button" onclick="playTokenMoveCardboardSoft()">
                <span class="sound-name">📦 Cardboard (Whisper)</span>
                <span class="sound-description">Subtle, very soft</span>
            </button>
            
            <button class="sound-button" onclick="playTokenMoveCardboardHarsh()">
                <span class="sound-name">📦 Cardboard (Swish)</span>
                <span class="sound-description">Air whoosh sound</span>
            </button>
            
            <button class="sound-button" onclick="playTokenMoveCardboardLong()">
                <span class="sound-name">📦 Cardboard (Glide)</span>
                <span class="sound-description">Long smooth glide</span>
            </button>
            
            <button class="sound-button" onclick="playTokenMoveCardboardCrunchy()">
                <span class="sound-name">📦 Cardboard (Slick)</span>
                <span class="sound-description">Like smooth plastic</span>
            </button>
            
            
            <button class="sound-button" style="grid-column: 1/-1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" onclick="playPassGo()">
                <span class="sound-name">────────── OTHER SOUNDS ──────────</span>
            </button>
            
            <button class="sound-button" onclick="playPassGo()">
                <span class="sound-name">🎉 Pass Go</span>
                <span class="sound-description">Happy ascending chord</span>
            </button>
            
            <button class="sound-button" onclick="playBuyProperty()">
                <span class="sound-name">🏠 Buy Property</span>
                <span class="sound-description">Purchase chord</span>
            </button>
            
            <button class="sound-button" onclick="playPayRent()">
                <span class="sound-name">💰 Pay Rent</span>
                <span class="sound-description">Minor descending</span>
            </button>
            
            <button class="sound-button" onclick="playAuctionBid()">
                <span class="sound-name">🔨 Auction Bid</span>
                <span class="sound-description">Sharp beep</span>
            </button>
            
            <button class="sound-button" onclick="playAuctionWin()">
                <span class="sound-name">🎊 Auction Win</span>
                <span class="sound-description">Victory chord</span>
            </button>
            
            <button class="sound-button" onclick="playBuildHouse()">
                <span class="sound-name">🏘️ Build House</span>
                <span class="sound-description">Rising notes</span>
            </button>
            
            <button class="sound-button" onclick="playBuildHotel()">
                <span class="sound-name">🏨 Build Hotel</span>
                <span class="sound-description">Major chord + ding</span>
            </button>
            
            <button class="sound-button" onclick="playGoToJail()">
                <span class="sound-name">🔒 Go to Jail</span>
                <span class="sound-description">Descending sawtooth</span>
            </button>
            
            <button class="sound-button" onclick="playReleaseJail()">
                <span class="sound-name">🔓 Released from Jail</span>
                <span class="sound-description">Ascending notes</span>
            </button>
            
            <button class="sound-button" onclick="playDrawCard()">
                <span class="sound-name">🃏 Draw Card</span>
                <span class="sound-description">Quick ascending beeps</span>
            </button>
            
            <button class="sound-button" onclick="playBankruptcy()">
                <span class="sound-name">💥 Bankruptcy</span>
                <span class="sound-description">Sad descending</span>
            </button>
            
            <button class="sound-button" onclick="playGameOver()">
                <span class="sound-name">🏁 Game Over</span>
                <span class="sound-description">Fanfare</span>
            </button>
            
            <button class="sound-button" onclick="playTradeAccepted()">
                <span class="sound-name">✅ Trade Accepted</span>
                <span class="sound-description">Happy chord</span>
            </button>
            
            <button class="sound-button" onclick="playTradeDeclined()">
                <span class="sound-name">❌ Trade Declined</span>
                <span class="sound-description">Negative beeps</span>
            </button>
            
            <button class="sound-button" onclick="playMortgage()">
                <span class="sound-name">📋 Mortgage</span>
                <span class="sound-description">Descending triangle</span>
            </button>
            
            <button class="sound-button" onclick="playButtonClick()">
                <span class="sound-name">👆 Button Click</span>
                <span class="sound-description">UI click sound</span>
            </button>
        </div>
    </div>

    <script>
        let ctx = null;
        let volume = 50;

        function getCtx() {
            if (!ctx) ctx = new AudioContext();
            if (ctx.state === 'suspended') ctx.resume();
            return ctx;
        }

        function vol() {
            return volume / 100;
        }

        function beep(freq, duration, type = 'sine', gain = 0.3) {
            const c = getCtx();
            const osc = c.createOscillator();
            const g = c.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            g.gain.setValueAtTime(gain * vol(), c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
            osc.connect(g);
            g.connect(c.destination);
            osc.start();
            osc.stop(c.currentTime + duration);
        }

        function chord(freqs, duration, type = 'sine', gain = 0.2) {
            freqs.forEach(f => beep(f, duration, type, gain / freqs.length));
        }

        function noise(duration, gain = 0.15) {
            const c = getCtx();
            const buf = c.createBuffer(1, c.sampleRate * duration, c.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const src = c.createBufferSource();
            src.buffer = buf;
            const g = c.createGain();
            g.gain.setValueAtTime(gain * vol(), c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
            src.connect(g);
            g.connect(c.destination);
            src.start();
            src.stop(c.currentTime + duration);
        }

        function playDiceRoll() {
            noise(0.12, 0.25);
            setTimeout(() => noise(0.08, 0.2), 80);
            setTimeout(() => noise(0.06, 0.15), 140);
        }

        function playTokenMove() {
            beep(800 + Math.random() * 200, 0.04, 'triangle', 0.12);
        }

        function playTokenMoveCardboard() {
            // Smooth sliding sound - continuous glide
            const c = getCtx();
            const buf = c.createBuffer(1, c.sampleRate * 0.05, c.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.4;
            }
            const src = c.createBufferSource();
            src.buffer = buf;
            const g = c.createGain();
            g.gain.setValueAtTime(0.08 * vol(), c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.05);
            src.connect(g);
            g.connect(c.destination);
            src.start();
            src.stop(c.currentTime + 0.05);
        }

        function playTokenMoveCardboardSoft() {
            // Whisper slide - very subtle, smooth
            const c = getCtx();
            const buf = c.createBuffer(1, c.sampleRate * 0.04, c.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.2;
            }
            const src = c.createBufferSource();
            src.buffer = buf;
            const g = c.createGain();
            g.gain.setValueAtTime(0.05 * vol(), c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.04);
            src.connect(g);
            g.connect(c.destination);
            src.start();
            src.stop(c.currentTime + 0.04);
        }

        function playTokenMoveCardboardHarsh() {
            // Swish slide - like air whoosh
            const c = getCtx();
            const buf = c.createBuffer(1, c.sampleRate * 0.06, c.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                const fadeIn = i / data.length;
                data[i] = (Math.random() * 2 - 1) * fadeIn * 0.5;
            }
            const src = c.createBufferSource();
            src.buffer = buf;
            const g = c.createGain();
            g.gain.setValueAtTime(0.08 * vol(), c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.06);
            src.connect(g);
            g.connect(c.destination);
            src.start();
            src.stop(c.currentTime + 0.06);
        }

        function playTokenMoveCardboardLong() {
            // Long glide - smooth continuous slide across board
            const c = getCtx();
            const buf = c.createBuffer(1, c.sampleRate * 0.1, c.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                const fadeOut = 1 - (i / data.length);
                data[i] = (Math.random() * 2 - 1) * 0.35 * fadeOut;
            }
            const src = c.createBufferSource();
            src.buffer = buf;
            const g = c.createGain();
            g.gain.setValueAtTime(0.1 * vol(), c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.1);
            src.connect(g);
            g.connect(c.destination);
            src.start();
            src.stop(c.currentTime + 0.1);
        }

        function playTokenMoveCardboardCrunchy() {
            // Slick slide - smooth like on plastic
            const c = getCtx();
            const buf = c.createBuffer(1, c.sampleRate * 0.05, c.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.3;
            }
            const src = c.createBufferSource();
            src.buffer = buf;
            const g = c.createGain();
            g.gain.setValueAtTime(0.07 * vol(), c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.05);
            src.connect(g);
            g.connect(c.destination);
            src.start();
            src.stop(c.currentTime + 0.05);
        }

        function playPassGo() {
            chord([523, 659, 784], 0.3, 'sine', 0.4);
            setTimeout(() => chord([659, 784, 1047], 0.4, 'sine', 0.35), 200);
        }

        function playBuyProperty() {
            chord([392, 494, 587], 0.25, 'sine', 0.35);
            setTimeout(() => beep(784, 0.3, 'sine', 0.3), 220);
        }

        function playPayRent() {
            beep(440, 0.15, 'sine', 0.25);
            setTimeout(() => beep(370, 0.15, 'sine', 0.22), 140);
            setTimeout(() => beep(330, 0.2, 'sine', 0.2), 280);
        }

        function playAuctionBid() {
            beep(660, 0.08, 'square', 0.15);
        }

        function playAuctionWin() {
            chord([523, 659, 784, 1047], 0.5, 'sine', 0.4);
        }

        function playBuildHouse() {
            beep(440, 0.08, 'triangle', 0.2);
            setTimeout(() => beep(554, 0.1, 'triangle', 0.2), 80);
        }

        function playBuildHotel() {
            chord([523, 659, 784], 0.2, 'triangle', 0.35);
            setTimeout(() => beep(1047, 0.3, 'sine', 0.3), 180);
        }

        function playGoToJail() {
            beep(220, 0.15, 'sawtooth', 0.25);
            setTimeout(() => beep(196, 0.15, 'sawtooth', 0.22), 150);
            setTimeout(() => beep(165, 0.3, 'sawtooth', 0.2), 300);
        }

        function playReleaseJail() {
            beep(523, 0.1, 'sine', 0.2);
            setTimeout(() => beep(659, 0.15, 'sine', 0.25), 100);
        }

        function playDrawCard() {
            beep(880, 0.06, 'sine', 0.2);
            setTimeout(() => beep(1108, 0.08, 'sine', 0.2), 60);
        }

        function playBankruptcy() {
            beep(330, 0.2, 'sawtooth', 0.3);
            setTimeout(() => beep(277, 0.2, 'sawtooth', 0.25), 200);
            setTimeout(() => beep(220, 0.4, 'sawtooth', 0.2), 400);
            setTimeout(() => beep(165, 0.5, 'sine', 0.15), 700);
        }

        function playGameOver() {
            const notes = [523, 659, 784, 1047, 784, 1047, 1319];
            notes.forEach((f, i) => setTimeout(() => beep(f, 0.2, 'sine', 0.3), i * 130));
        }

        function playTradeAccepted() {
            chord([523, 659, 784], 0.3, 'sine', 0.3);
        }

        function playTradeDeclined() {
            beep(330, 0.2, 'sine', 0.2);
            setTimeout(() => beep(277, 0.25, 'sine', 0.18), 180);
        }

        function playMortgage() {
            beep(440, 0.1, 'triangle', 0.18);
            setTimeout(() => beep(370, 0.15, 'triangle', 0.15), 100);
        }

        function playButtonClick() {
            beep(660, 0.04, 'square', 0.1);
        }

        // Volume control
        document.getElementById('volume').addEventListener('input', (e) => {
            volume = e.target.value;
            document.getElementById('volumeValue').textContent = volume + '%';
        });
    </script>
</body>
</html>
